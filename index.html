<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>CREATIVE PORTFOLIO</h1>
        <p>Video Editor & Content Creator</p>
    </header>

    <main>
        <section class="portfolio-section">
            <h2>🎬 Short-form & Videos</h2>
            <div class="grid-container" id="video-grid">
                </div>
        </section>

        <section class="portfolio-section">
            <h2>🎨 Design & Goods</h2>
            <div class="grid-container">
                
                <div class="card">
                    <div class="img-container">
                        <img src="images/poster.png" alt="홍보 인포그래픽 포스터" class="mockup-img">
                    </div>
                    <div class="card-info">
                        <h3>프로모션 인포그래픽 포스터</h3>
                        <p>핵심 정보를 한눈에 파악할 수 있도록 시각화한 홍보용 포스터 디자인입니다.</p>
                    </div>
                </div>

                <div class="card">
                    <div class="img-container">
                        <img src="images/goods.png" alt="브랜드 굿즈 디자인" class="mockup-img">
                    </div>
                    <div class="card-info">
                        <h3>브랜드 굿즈 디자인</h3>
                        <p>콘텐츠 브랜딩의 일환으로 제작된 오프라인 홍보용 굿즈 디자인입니다.</p>
                    </div>
                </div>

            </div>
        </section>

        <section class="portfolio-section">
            <h2>🌐 Web Projects</h2>
            <div class="grid-container">
                <a href="https://busangukbap.aiapp.help/" target="_blank" class="web-card">
                    <h3>캠페인 홍보 랜딩 페이지 바로가기 ➔</h3>
                    <p>직접 기획 및 제작에 참여하여 마케팅 효과를 극대화한 웹 페이지입니다.</p>
                </a>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
